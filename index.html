<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vylocis Portfolio</title>

  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">VYLOCIS PORTFOLIO</h1>
</header>

<section class="hero">
  <div class="hero-box">
    <h1 class="main-title">VYLOCIS</h1>
    <p class="subtitle">Minecraft Server Developer</p>
    <p class="desc">I build smooth, optimized Survival & Lifesteal servers with clean plugin setups.</p>
  </div>
</section>

<section class="section">
  <h2>MY SERVICES</h2>
  <div class="cards">
    <div class="card">Full Server Setup</div>
    <div class="card">Plugin Configuration</div>
    <div class="card">Survival Setup</div>
    <div class="card">Lifesteal Setup</div>
  </div>
</section>

<section class="section dark">
  <h2>MY WORK</h2>
  <div class="gallery">
    <img src="spawn-main.png">
    <img src="spawn-npcs.png">
    <img src="spawn-wide.png">
    <img src="spawn-angle.png">
    <img src="spawn-side.png">
    <img src="kits-gui.png">
  </div>
</section>

<section class="section">
  <h2>CONTACT</h2>
  <p>Discord: <strong>vylocis</strong></p>
  <p>Email: <strong>vylocis.buisness@gmail.com</strong></p>
</section>

<div id="popup">
  <img id="popup-img">
</div>

<script>
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");

document.querySelectorAll(".gallery img").forEach(img => {
  img.onclick = () => {
    popup.style.display = "flex";
    popupImg.src = img.src;
  };
});

popup.onclick = () => {
  popup.style.display = "none";
};
</script>

</body>
</html>
